baseURL = "https://viewit.co.kr/"
languageCode = "ko"
title = "ViewIt - AI 리뷰 분석"
theme = "PaperMod"
defaultContentLanguage = "ko"

[params]
  env = "production"
  description = "AI가 분석한 실구매자 리뷰, 한눈에 보는 제품 비교"
  author = "ViewIt"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowToc = true
  images = ["cover.png"]

  [params.homeInfoParams]
    Title = "AI가 대신 읽어주는 실구매 리뷰"
    Content = "수백 개의 실구매 리뷰를 AI로 분석하여, 제품의 진짜 장단점을 알려드립니다."

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[menu]
  [[menu.main]]
    name = "홈"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "로봇청소기"
    url = "/categories/로봇청소기/"
    weight = 2
  [[menu.main]]
    name = "구매가이드"
    url = "/tags/구매가이드/"
    weight = 3